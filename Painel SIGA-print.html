<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SIGA — Painel administrativo (Impressão)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { background: #fafaf7; }

    /* Each page is a static snapshot of the app at a given route */
    .print-page {
      width: 1400px;
      background: var(--bg);
      page-break-after: always;
      break-after: page;
      overflow: hidden;
    }
    .print-page:last-child { page-break-after: auto; break-after: auto; }

    /* Inside each page, replicate the app shell but non-sticky */
    .print-page .app {
      display: grid;
      grid-template-columns: 248px 1fr;
      min-height: auto;
    }
    .print-page .sidebar { position: relative; height: auto; min-height: 900px; }
    .print-page .topbar { position: relative; }
    .print-page .tweaks-toggle, .print-page .tweaks { display: none !important; }
    .print-page .content { padding: 28px; max-width: none; }

    /* Per-page label bar */
    .page-label {
      background: var(--ink);
      color: var(--bg);
      padding: 10px 28px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .page-label .r { font-family: "JetBrains Mono", monospace; letter-spacing: 0.04em; color: #a8a29e; }

    @page {
      size: 1400px 1900px;
      margin: 0;
    }

    @media print {
      html, body { background: #fff; margin: 0; padding: 0; }
      .print-page { box-shadow: none; margin: 0; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }

    @media screen {
      body { padding: 24px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
      .print-page { box-shadow: 0 4px 30px rgba(0,0,0,0.06); border: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div id="p-dashboard" class="print-page"></div>
  <div id="p-processos" class="print-page"></div>
  <div id="p-detail"    class="print-page"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="processes.jsx"></script>
  <script type="text/babel" src="detail.jsx"></script>

  <script type="text/babel">
    document.documentElement.dataset.theme = "light";
    document.documentElement.dataset.density = "balanced";
    document.documentElement.dataset.sidebar = "expanded";

    function PageFrame({ route, recordId, label, num, children }) {
      const sidebarRoute = route === "detail" ? "processos" : route;
      return (
        <>
          <div className="page-label">
            <span>SIGA · {label}</span>
            <span className="r">{num} / 3 · 20 ABR 2026</span>
          </div>
          <div className="app">
            <Sidebar route={sidebarRoute} setRoute={() => {}} collapsed={false} />
            <div className="main">
              <Topbar route={route} setRoute={() => {}} recordId={recordId} onToggleSidebar={() => {}} />
              <div className="content">{children}</div>
            </div>
          </div>
        </>
      );
    }

    const noop = () => {};

    ReactDOM.createRoot(document.getElementById("p-dashboard")).render(
      <PageFrame route="dashboard" label="Painel geral" num="01">
        <DashboardScreen goToDetail={noop} />
      </PageFrame>
    );
    ReactDOM.createRoot(document.getElementById("p-processos")).render(
      <PageFrame route="processos" label="Processos" num="02">
        <ProcessesScreen goToDetail={noop} />
      </PageFrame>
    );
    ReactDOM.createRoot(document.getElementById("p-detail")).render(
      <PageFrame route="detail" recordId="SEI-2026.0412.0087" label="Detalhe do processo" num="03">
        <DetailScreen recordId="SEI-2026.0412.0087" back={noop} />
      </PageFrame>
    );

    // Auto-print after fonts + render settle
    (async () => {
      try { await document.fonts.ready; } catch {}
      await new Promise(r => setTimeout(r, 700));
      window.print();
    })();
  </script>
</body>
</html>
